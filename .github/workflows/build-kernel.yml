name: Build A356e Kernel (KernelSU)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:

      # ════════════════════════════════════════════════════════════
      # 1. Checkout kernel source
      # ════════════════════════════════════════════════════════════
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          path: kernel

      # ════════════════════════════════════════════════════════════
      # 2. Install build dependencies  (physwizz step 1)
      # ════════════════════════════════════════════════════════════
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            bc bison flex \
            libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            make git curl \
            python3 python-is-python3 \
            build-essential openssl \
            cpio lz4 zstd tar gzip zip \
            libtinfo5 || true

      # ════════════════════════════════════════════════════════════
      # 3. Download Clang r450784d  (physwizz step 6 + build_kernel.sh)
      # ════════════════════════════════════════════════════════════
      - name: Cache Clang r450784d
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: toolchain/clang
          key: clang-r450784d-v3

      - name: Download Clang r450784d
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d
          curl -L \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz" \
            -o /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz \
            -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz
          toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version

      # ════════════════════════════════════════════════════════════
      # 4. Download kernel build-tools  (physwizz build_kernel.sh HOSTCFLAGS)
      # ════════════════════════════════════════════════════════════
      - name: Cache kernel build-tools
        id: buildtools-cache
        uses: actions/cache@v4
        with:
          path: toolchain/prebuilts/kernel-build-tools
          key: kernel-build-tools-v3

      - name: Download kernel prebuilt build-tools
        if: steps.buildtools-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/kernel-build-tools \
            toolchain/prebuilts/kernel-build-tools

      - name: Cache build/kernel path tools
        id: build-kernel-cache
        uses: actions/cache@v4
        with:
          path: toolchain/build
          key: build-kernel-path-v3

      - name: Download build/kernel path tools
        if: steps.build-kernel-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/kernel/build \
            toolchain/build/kernel

      # ════════════════════════════════════════════════════════════
      # 5. Set build environment  (exact vars from build_kernel.sh)
      # ════════════════════════════════════════════════════════════
      - name: Set up build environment
        run: |
          CLANG_BIN="$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin"
          BUILD_PATH="$(pwd)/toolchain/build/kernel/build-tools/path/linux-x86"
          PREBUILTS="$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86"
          SYSROOT="$(pwd)/toolchain/build/kernel/build-tools/sysroot"

          # PATH - Clang first, then build-tools, then system
          echo "PATH=${CLANG_BIN}:${BUILD_PATH}:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" >> $GITHUB_ENV

          # Exact vars from build_kernel.sh
          echo "HOSTCFLAGS=--sysroot=${SYSROOT} -I${PREBUILTS}/include"                                                                                              >> $GITHUB_ENV
          echo "HOSTLDFLAGS=--sysroot=${SYSROOT} -Wl,-rpath,${PREBUILTS}/lib64 -L${PREBUILTS}/lib64 -fuse-ld=lld --rtlib=compiler-rt"                                >> $GITHUB_ENV
          echo "DTC_FLAGS=-@"                      >> $GITHUB_ENV
          echo "PLATFORM_VERSION=15"               >> $GITHUB_ENV
          echo "ANDROID_MAJOR_VERSION=v"           >> $GITHUB_ENV
          echo "LLVM=1"                            >> $GITHUB_ENV
          echo "LLVM_IAS=1"                        >> $GITHUB_ENV
          echo "DEPMOD=depmod"                     >> $GITHUB_ENV
          echo "ARCH=arm64"                        >> $GITHUB_ENV
          echo "TARGET_SOC=s5e8835"                >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-"  >> $GITHUB_ENV

          echo "=== Clang version ==="
          ${CLANG_BIN}/clang --version

      # ════════════════════════════════════════════════════════════
      # 6. Add KernelSU - rksu manual hook  (physwizz step 23)
      #    Non-GKI kernel → manual hook, no kprobes
      # ════════════════════════════════════════════════════════════
      - name: Add KernelSU (rksu - manual hook)
        working-directory: kernel
        run: |
          echo "==> Integrating rksu..."
          curl -LSs \
            "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" \
            | bash -s main
          echo "==> rksu done."

      # ════════════════════════════════════════════════════════════
      # 7. Personal setup - kernel version tag  (physwizz step 8)
      # ════════════════════════════════════════════════════════════
      - name: Set kernel local version
        working-directory: kernel
        run: |
          DEFCONFIG="arch/arm64/configs/s5e8835-a35xjvxx_defconfig"
          if [ -f "$DEFCONFIG" ]; then
            sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-KSU"/' "$DEFCONFIG" 2>/dev/null || true
            grep -q "CONFIG_LOCALVERSION_AUTO" "$DEFCONFIG" \
              && sed -i 's/CONFIG_LOCALVERSION_AUTO=.*/CONFIG_LOCALVERSION_AUTO=n/' "$DEFCONFIG" \
              || echo "CONFIG_LOCALVERSION_AUTO=n" >> "$DEFCONFIG"
          fi

      # ════════════════════════════════════════════════════════════
      # 8. make defconfig  (physwizz step 10 + build_kernel.sh)
      # ════════════════════════════════════════════════════════════
      - name: make defconfig
        working-directory: kernel
        run: |
          make s5e8835-a35xjvxx_defconfig

      # ════════════════════════════════════════════════════════════
      # 9. Apply all config changes from physwizz README
      #    - rksu manual hook     (step 23)
      #    - Permissive selinux   (step 21)
      #    - Disable anti-root    (step 21 + 37)
      #    - Module force         (step 21 + 37)
      #    - Integrity off        (step 21)
      #    - Performance opts     (step 37)
      #    - LZ4 zram             (step 25 + 37)
      #    - Image.gz             (step 34)
      #    - Kallsyms (Apatch)    (step 26)
      # ════════════════════════════════════════════════════════════
      - name: Apply all physwizz config options
        working-directory: kernel
        run: |

          # ── rksu manual hook (step 23) ──────────────────────────
          ./scripts/config --enable  CONFIG_KSU
          ./scripts/config --enable  CONFIG_KSU_MANUAL_HOOK
          ./scripts/config --disable CONFIG_KPROBES
          ./scripts/config --disable CONFIG_HAVE_KPROBES
          ./scripts/config --disable CONFIG_KPROBE_EVENTS

          # ── Permissive SELinux (step 21 - method 2) ─────────────
          ./scripts/config --enable  CONFIG_SECURITY_SELINUX_DEVELOP
          ./scripts/config --disable CONFIG_SECURITY_SELINUX_ALWAYS_ENFORCE
          ./scripts/config --enable  CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE
          ./scripts/config --enable  CONFIG_CMDLINE_EXTEND
          # set cmdline permissive
          ./scripts/config --set-str CONFIG_CMDLINE "androidboot.selinux=permissive"

          # ── Disable Samsung anti-root (step 21 + 37) ────────────
          ./scripts/config --disable CONFIG_UH
          ./scripts/config --disable CONFIG_UH_RKP
          ./scripts/config --disable CONFIG_RKP
          ./scripts/config --disable CONFIG_RKP_KDP
          ./scripts/config --disable CONFIG_RKP_NS_PROT
          ./scripts/config --disable CONFIG_RKP_DMAP_PROT
          ./scripts/config --disable CONFIG_KDP
          ./scripts/config --disable CONFIG_KDP_CRED
          ./scripts/config --disable CONFIG_SECURITY_DEFEX
          ./scripts/config --disable CONFIG_PROCA
          ./scripts/config --disable CONFIG_FIVE
          ./scripts/config --disable CONFIG_TIMA
          ./scripts/config --disable CONFIG_TIMA_LKMAUTH
          ./scripts/config --disable CONFIG_TIMA_LKM_BLOCK
          ./scripts/config --disable CONFIG_TIMA_LKMAUTH_CODE_PROT
          ./scripts/config --disable CONFIG_TIMA_LOG
          ./scripts/config --disable CONFIG_KNOX_KAP
          ./scripts/config --disable CONFIG_KNOX_NCM
          ./scripts/config --disable CONFIG_DM_VERITY
          ./scripts/config --disable CONFIG_SEC_RESTRICT_ROOTING
          ./scripts/config --disable CONFIG_SEC_RESTRICT_SETUID
          ./scripts/config --disable CONFIG_SEC_RESTRICT_FORK
          ./scripts/config --disable CONFIG_SEC_RESTRICT_ROOTING_LOG
          ./scripts/config --disable CONFIG_SECURITY_DSMS
          ./scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG

          # ── Integrity off (step 21 + 37) ─────────────────────────
          ./scripts/config --disable CONFIG_INTEGRITY
          ./scripts/config --disable CONFIG_INTEGRITY_SIGNATURE
          ./scripts/config --disable CONFIG_INTEGRITY_ASYMMETRIC_KEYS
          ./scripts/config --disable CONFIG_INTEGRITY_TRUSTED_KEYRING
          ./scripts/config --disable CONFIG_INTEGRITY_AUDIT

          # ── Module force load (step 21 + 37) ─────────────────────
          ./scripts/config --enable CONFIG_MODULE_FORCE_LOAD
          ./scripts/config --enable CONFIG_MODULE_UNLOAD
          ./scripts/config --enable CONFIG_MODULE_FORCE_UNLOAD

          # ── CPU governors (step 37) ───────────────────────────────
          ./scripts/config --enable CONFIG_CPU_FREQ_GOV_PERFORMANCE
          ./scripts/config --enable CONFIG_CPU_FREQ_GOV_POWERSAVE
          ./scripts/config --enable CONFIG_CPU_FREQ_GOV_USERSPACE
          ./scripts/config --enable CONFIG_CPU_FREQ_GOV_ONDEMAND
          ./scripts/config --enable CONFIG_CPU_FREQ_GOV_CONSERVATIVE

          # ── Performance optimization (step 37) ───────────────────
          ./scripts/config --enable  CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --disable CONFIG_CC_OPTIMIZE_FOR_SIZE

          # ── LZ4 zram (step 25 + 37) ──────────────────────────────
          ./scripts/config --enable  CONFIG_ZRAM
          ./scripts/config --enable  CONFIG_ZRAM_WRITEBACK
          ./scripts/config --enable  CONFIG_ZRAM_MEMORY_TRACKING
          ./scripts/config --disable CONFIG_CRYPTO_LZO
          ./scripts/config --enable  CONFIG_CRYPTO_LZ4

          # ── Build Image.gz too (step 34) ─────────────────────────
          ./scripts/config --enable CONFIG_KERNEL_GZIP

          # ── Kallsyms for Apatch (step 26) ────────────────────────
          ./scripts/config --enable CONFIG_KALLSYMS
          ./scripts/config --enable CONFIG_KALLSYMS_ALL

          # ── Regenerate config cleanly ─────────────────────────────
          make olddefconfig

          echo ""
          echo "=== Config verification ==="
          grep -E "CONFIG_KSU|CONFIG_KSU_MANUAL_HOOK|CONFIG_UH=|CONFIG_SECURITY_DEFEX|CONFIG_PROCA=|CONFIG_INTEGRITY=|CONFIG_KALLSYMS=" .config

      # ════════════════════════════════════════════════════════════
      # 10. Build kernel  (physwizz step 10)
      # ════════════════════════════════════════════════════════════
      - name: Build kernel
        working-directory: kernel
        run: |
          make -j$(nproc) 2>&1 | tee build.log
          echo ""
          echo "=== Build result ==="
          ls -lh arch/arm64/boot/Image    2>/dev/null || echo "WARNING: Image not found"
          ls -lh arch/arm64/boot/Image.gz 2>/dev/null || echo "Image.gz not found (optional)"

      # ════════════════════════════════════════════════════════════
      # 11. Package artifacts
      # ════════════════════════════════════════════════════════════
      - name: Package output files
        run: |
          mkdir -p output
          cp kernel/arch/arm64/boot/Image    output/ 2>/dev/null || true
          cp kernel/arch/arm64/boot/Image.gz output/ 2>/dev/null || true
          cp kernel/.config                  output/kernel.config
          cp kernel/build.log                output/build.log
          echo "=== Output ==="
          ls -lh output/

      # ════════════════════════════════════════════════════════════
      # 12. Upload artifacts
      # ════════════════════════════════════════════════════════════
      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: A356e-KSU-${{ github.run_number }}
          path: |
            output/Image
            output/Image.gz
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: |
            output/build.log
            output/kernel.config
          retention-days: 7
